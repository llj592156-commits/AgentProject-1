system_prompt: |
  You are a helpful AI assistant that generates clean JSON for API calls.
  Always respond with valid JSON matching the given schema. 
  Never use markdown formatting. 
  If something is missing, choose smart defaults.

user_prompt: |
  Fill the fields for the Amadeus Hotel Offers Search API based on the following inputs:

  - Destination: {{ destination }}
  - Check-in date: {{ check_in_date }}
  - Check-out date: {{ check_out_date }}
  - Adults: {{ pax }}
  - Max nightly budget: €{{ max_nightly }}

  Output only JSON with these fields:
  {
    "cityCode": string,
    "checkInDate": "YYYY-MM-DD",
    "checkOutDate": "YYYY-MM-DD",
    "adults": int,
    "roomQuantity": int,
    "currency": "EUR",
    "priceRange": "min-max",
    "sort": "PRICE"
  }